# ============================================================
# Filament Sensor + Auto-Load + Cold Pull
# Voron Switchwire - Stealthburner
# ============================================================
 
[gcode_macro FILAMENT_LOAD]
gcode:
    LOAD_FILAMENT
 
[gcode_macro FILAMENT_UNLOAD]
gcode:
    UNLOAD_FILAMENT FILAMENT=PLA
 
[gcode_macro FILAMENT_COLD_PULL]
gcode:
    COLD_PULL
 
 
[filament_switch_sensor filament_sensor_hotend]
pause_on_runout: False
switch_pin: ^!SB2040:gpio29
 
[filament_switch_sensor filament_sensor]
switch_pin: ^!SB2040:gpio28
pause_on_runout: False
runout_gcode: FILAMENT_RUNOUT
insert_gcode: FILAMENT_INSERT
event_delay: 3.0
pause_delay: 0.5
 
[gcode_macro FILAMENT_STATUS]
description: Zeigt Filament Status
gcode:
    {% if printer['filament_switch_sensor filament_sensor'].filament_detected %}
        RESPOND PREFIX="✅ " MSG="Filament: EINGELEGT"
    {% else %}
        RESPOND PREFIX="❌ " MSG="Filament: LEER"
    {% endif %}
 
# ------------------------------------------------------------
# Runout: Druck pausieren
# ------------------------------------------------------------
[gcode_macro FILAMENT_RUNOUT]
description: Wird ausgelöst wenn Filament ausläuft
gcode:
    M117 Filament leer!
    M600
 
# ------------------------------------------------------------
# Insert: Filament greift + laden
# ------------------------------------------------------------

[gcode_macro _FILAMENT_AUTOLOAD_VAR]
variable_enabled: True
gcode:

[gcode_macro FILAMENT_AUTOLOAD_ON]
description: Automatisches Laden beim Insert aktivieren
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_AUTOLOAD_VAR VARIABLE=enabled VALUE=True
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1    # ← Sensor wieder aktivieren
    RESPOND MSG="Auto-Load: AKTIVIERT"

[gcode_macro FILAMENT_AUTOLOAD_OFF]
description: Automatisches Laden beim Insert deaktivieren
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_AUTOLOAD_VAR VARIABLE=enabled VALUE=False
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0    # ← Sensor deaktivieren
    RESPOND MSG="Auto-Load: DEAKTIVIERT"
    
[gcode_macro FILAMENT_INSERT]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
    {% if printer["gcode_macro _FILAMENT_AUTOLOAD_VAR"].enabled %}
        {% if printer.pause_resume.is_paused %}
            M117 Filament erkannt - lade automatisch...
            G4 P2000
            LOAD_FILAMENT HOTEND=230
        {% else %}
            M117 Filament erkannt - greife...
            SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
            G4 P500
            FORCE_MOVE STEPPER=extruder DISTANCE=5 VELOCITY=5
            M104 S230
            M109 S230
            LOAD_FILAMENT HOTEND=230
        {% endif %}
    {% else %}
        M117 Filament erkannt - Auto-Load deaktiviert
    {% endif %}
 
 
[gcode_macro COLD_PULL]
description: Nozzle Cold Pull Reinigung
variable_clean_temp: 200
variable_pull_temp: 90
variable_pull_distance: 100
gcode:
    {% set clean_temp = params.CLEAN_TEMP|default(200)|int %}
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}

    {% if filament == "PLA" %}
        {% set pull_temp = 105 %}
        {% set pull_velocity = 4 %}
    {% elif filament == "PETG" %}
        {% set pull_temp = 150 %}
        {% set pull_velocity = 5 %}
    {% elif filament == "ABS" or filament == "ASA" %}
        {% set pull_temp = 150 %}
        {% set pull_velocity = 6 %}
    {% elif filament == "TPU" %}
        {% set pull_temp = 150 %}
        {% set pull_velocity = 3 %}
    {% elif filament == "NYLON" or filament == "PA" %}
        {% set pull_temp = 150 %}
        {% set pull_velocity = 5 %}
    {% else %}
        {% set pull_temp = params.PULL_TEMP|default(95)|int %}
        {% set pull_velocity = 4 %}
    {% endif %}

    M117 Cold Pull ({filament}) - Pull bei {pull_temp}°C
    M104 S{clean_temp}
    M109 S{clean_temp}

    M117 Fülle Nozzle...
    M83
    G1 E20 F200
    G4 P3000
    M82

    M117 Kühle auf {pull_temp}°C ab...
    M106 S255
    M104 S{pull_temp}
    M109 R{pull_temp}       ; warten bis Temp auf Abkühlweg erreicht
    M106 S0

    M117 Führe Cold Pull aus...
    FORCE_MOVE STEPPER=extruder DISTANCE=-{pull_distance} VELOCITY={pull_velocity}

    M104 S0
    M117 Cold Pull fertig! Filament prüfen und ggf. wiederholen.
 
###############
# Load Unload #
###############
 
[gcode_macro UNLOAD_FILAMENT]
description: Unload Filament
gcode:
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}
 
    {% if filament == "PLA" %}
        {% set hotendtemp = 220 %}
        {% set unload_temp = 180 %}
    {% elif filament == "PETG" %}
        {% set hotendtemp = 240 %}
        {% set unload_temp = 200 %}
    {% elif filament == "ABS" or filament == "ASA" %}
        {% set hotendtemp = 250 %}
        {% set unload_temp = 210 %}
    {% elif filament == "TPU" %}
        {% set hotendtemp = 230 %}
        {% set unload_temp = 200 %}
    {% elif filament == "NYLON" or filament == "PA" %}
        {% set hotendtemp = 260 %}
        {% set unload_temp = 220 %}
    {% else %}
        {% set hotendtemp = params.HOTEND|default(230)|int %}
        {% set unload_temp = (hotendtemp - 40)|int %}
    {% endif %}
 
    SAVE_GCODE_STATE NAME=unload_state
    {% if printer.pause_resume.is_paused == False %}
      M104 S{hotendtemp}
      {% if printer.toolhead.homed_axes == 'xyz' %}
        G1 X200 Y50 Z50 F3600
      {% endif %}
      M117 Heating ({filament})
      STATUS_HEATING
      M109 S{hotendtemp}
      M117 Tip forming...
      STATUS_PRINTING
      G91
      G0 E10 F360
      {% if filament != "PLA" %}
        G0 E5 F3600
      {% endif %}
      G0 E-15 F3600
      G0 E2 F300
      G0 E-2.1 F300
      G0 E2 F300
      G0 E-2.2 F300
      G0 E2 F300
      G0 E-2.3 F300
      G0 E2 F300
      G0 E-2.4 F300
      G0 E2 F300
      G0 E-2.5 F300
      G0 E2 F300
      M117 Cooling to {unload_temp}°C...
      M104 S{unload_temp}
      M109 S{unload_temp}
      G0 E-38 F300
      G0 E-100 F3600
      M400
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
      M117 Fila unloaded, what now?
      G90
      {% if printer.toolhead.homed_axes == 'xyz' %}
        G0 X200 Y50 F3600
        M400
      {% endif %}
      M117 Hotend abkühlen...
      M104 S0
    {% else %}
      SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
      G4 P500
      M117 Unloading ({filament})
      STATUS_PRINTING
      G91
      G0 E5 F360
      {% if filament != "PLA" %}
        G0 E5 F3600
      {% endif %}
      G0 E-15 F3600
      G0 E2 F300
      G0 E-2.1 F300
      G0 E2 F300
      G0 E-2.2 F300
      G0 E2 F300
      G0 E-2.3 F300
      G0 E2 F300
      G0 E-2.4 F300
      G0 E2 F300
      G0 E-2.5 F300
      G0 E2 F300
      M117 Cooling to {unload_temp}°C...
      M104 S{unload_temp}
      M109 S{unload_temp}
      G0 E-38 F300
      G0 E-100 F3600
      M400
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
      M117 Fila unloaded, hurry up for the next!
      G90
    {% endif %}
    STATUS_READY
    RESTORE_GCODE_STATE NAME=unload_state
 
 
[gcode_macro LOAD_FILAMENT]
description: Load Filament
gcode:
    {% set hotendtemp = params.HOTEND|default(230)|int %}
    {% set is_printing = printer.print_stats.state == "printing" %}
    SAVE_GCODE_STATE NAME=load_state
    {% if printer.pause_resume.is_paused == False %}
      M104 S{hotendtemp}
      M117 Heating...
      STATUS_HEATING
      M109 S{hotendtemp}
      {% if printer.toolhead.homed_axes == 'xyz' %}
        G1 X215 Y0 Z50 F3600
      {% endif %}
      M117 Loading Filament...
      STATUS_PRINTING
      G91
      G1 E88 F360
      G1 E50 F360
      G1 E5 F3600
      G1 E-1 F1200
      M400
      M117 Filament ready...
      G90
      {% if printer.toolhead.homed_axes == 'xyz' %}
        G0 X215 Y0 F3600
        M400
      {% endif %}
      {% if not is_printing %}
        M117 Hotend abkühlen...
        M104 S0
      {% endif %}
      STATUS_READY
      RESTORE_GCODE_STATE NAME=load_state
    {% else %}
      M117 Loading Filament...
      STATUS_PRINTING
      G91
      G1 E88 F360
      G1 E50 F360
      G1 E5 F3600
      G1 E-1 F1200
      M400
      M117 Filament ready, resuming...
      G90
      RESTORE_GCODE_STATE NAME=load_state
      {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
      {% endif %}
      RESUME
    {% endif %}
 
 
# ===== KlipperScreen Wrapper =====
 
[gcode_macro FILAMENT_UNLOAD_PLA]
description: Unload PLA
gcode:
    UNLOAD_FILAMENT FILAMENT=PLA
 
[gcode_macro FILAMENT_UNLOAD_PETG]
description: Unload PETG
gcode:
    UNLOAD_FILAMENT FILAMENT=PETG
 
[gcode_macro FILAMENT_UNLOAD_ABS]
description: Unload ABS/ASA
gcode:
    UNLOAD_FILAMENT FILAMENT=ABS
 
[gcode_macro FILAMENT_UNLOAD_TPU]
description: Unload TPU
gcode:
    UNLOAD_FILAMENT FILAMENT=TPU